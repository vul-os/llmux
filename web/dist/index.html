<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- theme-color tracks the paper background (light) and ink (dark) so the
         mobile chrome doesn't fight the warm-neutral palette. -->
    <meta name="theme-color" content="#fbf9f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#131110" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="llmux — the Vulos LLM gateway. One OpenAI-compatible gateway for every provider, in every language. Routing, fallbacks, budgets, caching, and live cost in a single Go binary. Part of the Vulos OS suite." />
    <title>llmux — the Vulos LLM gateway</title>

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="llmux — the Vulos LLM gateway" />
    <meta property="og:description" content="One OpenAI-compatible gateway for every provider, in every language. Part of the Vulos OS suite." />
    <meta property="og:url" content="https://vulos.org" />
    <meta property="og:image" content="https://vulos.org/og.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="llmux — the Vulos LLM gateway" />
    <meta name="twitter:description" content="One OpenAI-compatible gateway for every provider, in every language." />
    <meta name="twitter:image" content="https://vulos.org/og.jpg" />

    <!--
      Fonts: OS-native grotesque + serif via ui-sans-serif / ui-serif (see
      src/styles.css). Distinctive and characterful without shipping a webfont,
      and avoids the Inter sameness of generic React apps — matches the Vulos suite.
    -->
    <script type="module" crossorigin src="/ui/assets/index-D3DDh-b5.js"></script>
    <link rel="stylesheet" crossorigin href="/ui/assets/index-CpR50XsN.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- Set the saved theme before first paint to avoid a flash. An explicit
         choice (light/dark) wins; otherwise we defer to prefers-color-scheme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("llmux_theme");
          if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </body>
</html>
