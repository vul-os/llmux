<svg xmlns="http://www.w3.org/2000/svg" width="440" height="120" viewBox="0 0 440 120" fill="none" role="img" aria-label="llmux — the LLM multiplexer">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffbd87"/><stop offset="1" stop-color="#f5792c"/>
    </linearGradient>
    <linearGradient id="chan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9a4d"/><stop offset="1" stop-color="#4fe3c8"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- self-contained panel: reads on any background -->
  <rect x="0.75" y="0.75" width="438.5" height="118.5" rx="22" fill="#0a0c11"/>
  <rect x="0.75" y="0.75" width="438.5" height="118.5" rx="22" fill="none" stroke="#2b3343" stroke-width="1.5"/>
  <g stroke="#161a23" stroke-width="1">
    <path d="M32 0V120M64 0V120M96 0V120"/><path d="M0 40H128M0 80H128"/>
  </g>

  <!-- ===== mark in a beveled tile ===== -->
  <g transform="translate(28,28)">
    <rect x="0" y="0" width="64" height="64" rx="15" fill="#11141a" stroke="#2b3343" stroke-width="1.5"/>
    <g transform="translate(11,16)">
      <g stroke="url(#amber)" stroke-width="2.4" fill="none" stroke-linecap="round">
        <path d="M3 2 C16 2 16 14 22 14.4"/>
        <path d="M3 11 C13 11 18 15 22 15.4"/>
        <path d="M3 21 C13 21 18 16 22 15.8"/>
        <path d="M3 30 C16 30 16 17 22 16.6"/>
      </g>
      <g fill="url(#amber)">
        <circle cx="3" cy="2" r="2.3"/><circle cx="3" cy="11" r="2.3"/>
        <circle cx="3" cy="21" r="2.3"/><circle cx="3" cy="30" r="2.3"/>
      </g>
      <path d="M22 5 L34 12 L34 20 L22 27 Z" fill="#161a23" stroke="url(#amber)" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M34 16 H43" stroke="url(#chan)" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="43" cy="16" r="2.8" fill="#4fe3c8" filter="url(#glow)"/>
    </g>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="118" y="63" font-family="'Bricolage Grotesque','Hanken Grotesk',-apple-system,'Segoe UI',sans-serif"
        font-size="46" font-weight="800" letter-spacing="-2" fill="#f3f4f8">llmu<tspan fill="#ff9a4d">x</tspan></text>
  <text x="120" y="88" font-family="'JetBrains Mono',ui-monospace,monospace"
        font-size="11.5" letter-spacing="4.5" fill="#98a0b1">THE · LLM · MULTIPLEXER</text>
</svg>
