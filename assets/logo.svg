<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" fill="none" role="img" aria-label="llmux — the LLM multiplexer">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb27d"/>
      <stop offset="1" stop-color="#ff8c42"/>
    </linearGradient>
    <linearGradient id="chan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8c42"/>
      <stop offset="1" stop-color="#46e6c9"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- panel: self-contained so it reads on light or dark backgrounds -->
  <rect x="0.75" y="0.75" width="418.5" height="118.5" rx="22" fill="#0a0b0e"/>
  <rect x="0.75" y="0.75" width="418.5" height="118.5" rx="22" fill="none" stroke="#23283a" stroke-width="1.5"/>
  <!-- faint patchbay grid inside the panel -->
  <g stroke="#161a24" stroke-width="1">
    <path d="M30 0V120M60 0V120M90 0V120"/>
    <path d="M0 40H120M0 80H120"/>
  </g>

  <!-- ===== mark ===== -->
  <g transform="translate(34,28)">
    <!-- inputs converging into the mux -->
    <g stroke="url(#amber)" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M2 10 C24 10 24 30 40 31"/>
      <path d="M2 24 C20 24 26 31 40 32"/>
      <path d="M2 40 C20 40 26 33 40 33"/>
      <path d="M2 54 C24 54 24 35 40 34"/>
    </g>
    <g fill="url(#amber)">
      <circle cx="2" cy="10" r="3.4"/><circle cx="2" cy="24" r="3.4"/>
      <circle cx="2" cy="40" r="3.4"/><circle cx="2" cy="54" r="3.4"/>
    </g>

    <!-- mux gate (trapezoid) -->
    <path d="M40 14 L62 25 L62 39 L40 50 Z" fill="#161a24" stroke="url(#amber)" stroke-width="3" stroke-linejoin="round"/>

    <!-- single output channel -->
    <path d="M62 32 H84" stroke="url(#chan)" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="84" cy="32" r="4.4" fill="#46e6c9" filter="url(#glow)"/>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="150" y="63" font-family="'Bricolage Grotesque','Hanken Grotesk',-apple-system,'Segoe UI',sans-serif"
        font-size="46" font-weight="800" letter-spacing="-2" fill="#ecedf2">llmu<tspan fill="#ff8c42">x</tspan></text>
  <text x="152" y="88" font-family="'JetBrains Mono',ui-monospace,monospace"
        font-size="11.5" letter-spacing="4.5" fill="#8b90a0">THE · LLM · MULTIPLEXER</text>
</svg>
