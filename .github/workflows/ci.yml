name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: llmux_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      # Enables the gated Postgres/Redis integration tests in CI.
      LLMUX_TEST_POSTGRES: postgres://postgres:postgres@localhost:5432/llmux_test?sslmode=disable
      LLMUX_TEST_REDIS: localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build embedded web UI
        run: |
          npm --prefix web ci
          npm --prefix web run build

      # The bundle we just built is embedded into the gateway binary and served
      # at /ui. A bundle that BUILDS but does not RUN is a blank screen for every
      # user — `vite build` cannot see that, only a real browser can. Boot it in
      # chromium and fail on any uncaught exception / empty root. This also walks
      # the React.lazy() /docs and /app chunks, whose defects do not exist until
      # their route is visited.
      - name: Install chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      # `npm test` → pretest:e2e (vite build) → playwright test
      - name: Web boot guard + E2E
        working-directory: web
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: llmux-playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt check
        run: test -z "$(gofmt -l core cmd sdks web)"

      - name: Test
        run: go test -race -cover -timeout 180s ./...

  # Optional live-provider smoke (real keys via repo secrets). Skips gracefully
  # if secrets are absent.
  live:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Live smoke
        env:
          LLMUX_LIVE: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: go test -count=1 -run Live ./... || true
